<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Tally</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#1E2023;
    --surface:#26292D;
    --surface-2:#2F3338;
    --border:#3A3E44;
    --text:#F2EDE4;
    --text-muted:#9CA3A8;
    --accent:#FFB84D;
    --good:#7FD9A6;
    --warn:#FFB84D;
    --over:#FF6B6B;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Manrope',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .app{max-width:480px;margin:0 auto;padding:20px 16px 110px;}

  .eyebrow{
    font-family:'JetBrains Mono',monospace;
    letter-spacing:0.25em;
    text-transform:uppercase;
    font-size:11px;
    color:var(--accent);
    margin:0 0 4px;
  }
  h1{font-size:20px;margin:0 0 16px;font-weight:800;}

  .profile-switcher{display:flex;gap:8px;margin-bottom:16px;}
  .profile-btn{
    flex:1;background:var(--surface);border:1px solid var(--border);color:var(--text-muted);
    padding:10px;border-radius:8px;font-family:'JetBrains Mono',monospace;font-weight:700;
    font-size:12px;letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;
    transition:background .2s, color .2s, border-color .2s;
    -webkit-tap-highlight-color:transparent;
  }
  .profile-btn.active{background:var(--accent);color:#1E2023;border-color:var(--accent);}

  .meta-row{display:flex;gap:12px;}
  .meta-row label{
    flex:1;display:flex;flex-direction:column;gap:4px;
    font-size:11px;color:var(--text-muted);
    text-transform:uppercase;letter-spacing:0.1em;
  }
  .meta-row input{
    background:var(--surface);border:1px solid var(--border);
    color:var(--text);padding:10px;border-radius:8px;
    font-family:'JetBrains Mono',monospace;font-size:14px;
  }

  .gauge-section{display:flex;flex-direction:column;align-items:center;margin:28px 0 8px;}
  .gauge-wrap{position:relative;width:180px;height:180px;}
  .gauge-wrap svg{transform:rotate(-90deg);transform-origin:50% 50%;}
  #gaugeBg{stroke:var(--border);}
  #gaugeProgress{stroke:var(--good);transition:stroke-dashoffset .4s ease, stroke .3s ease;}
  .gauge-center{
    position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;
  }
  .gauge-total{
    font-family:'JetBrains Mono',monospace;font-size:38px;font-weight:700;
    transition:color .3s ease;
  }
  .gauge-target{
    font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text-muted);
    display:flex;align-items:center;gap:4px;margin-top:2px;
  }
  .gauge-target input{
    width:54px;background:transparent;border:none;border-bottom:1px solid var(--border);
    color:var(--text-muted);font-family:'JetBrains Mono',monospace;font-size:13px;
    text-align:center;padding:0 0 2px;
  }
  .gauge-status{
    margin-top:14px;font-size:13px;color:var(--text-muted);
    font-family:'JetBrains Mono',monospace;
    transition:color .3s ease;
  }

  .section-label{
    font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.18em;
    text-transform:uppercase;color:var(--text-muted);
    margin:26px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border);
    display:flex;justify-content:space-between;align-items:baseline;
  }
  .section-label span.count{color:var(--accent);}

  .item-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
  .item-tile{
    background:var(--surface);border:1px solid var(--border);border-radius:10px;
    padding:10px 12px;text-align:left;color:var(--text);cursor:pointer;
    transition:border-color .15s, transform .08s;
    -webkit-tap-highlight-color:transparent;
  }
  .item-tile:active{transform:scale(0.97);}
  .item-tile.tapped{border-color:var(--accent);}
  .item-tile .name{font-size:13px;line-height:1.35;}
  .item-tile .kcal{
    font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--accent);margin-top:4px;
  }

  .others-row{display:flex;gap:8px;}
  .others-row input[type="text"]{flex:2;min-width:0;}
  .others-row input[type="number"]{flex:1;min-width:0;}
  .others-row input{
    background:var(--surface);border:1px solid var(--border);color:var(--text);
    padding:10px;border-radius:8px;font-size:14px;font-family:'Manrope',sans-serif;
  }
  .others-row button{
    background:var(--surface-2);border:1px solid var(--border);color:var(--text);
    padding:10px 16px;border-radius:8px;font-weight:800;cursor:pointer;
    font-family:'Manrope',sans-serif;
  }

  .log-list{display:flex;flex-direction:column;gap:6px;}
  .log-row{
    display:flex;align-items:center;justify-content:space-between;
    background:var(--surface);border:1px solid var(--border);border-radius:8px;
    padding:8px 10px;font-size:13px;gap:8px;
  }
  .log-row .name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .log-row .kcal{font-family:'JetBrains Mono',monospace;color:var(--accent);white-space:nowrap;}
  .log-row .controls{display:flex;align-items:center;gap:6px;}
  .log-row button{
    background:var(--surface-2);border:1px solid var(--border);color:var(--text);
    width:26px;height:26px;border-radius:6px;cursor:pointer;
    font-family:'JetBrains Mono',monospace;font-size:14px;line-height:1;
  }
  .log-row .x-count{
    font-family:'JetBrains Mono',monospace;color:var(--text-muted);font-size:12px;
    min-width:18px;text-align:center;
  }
  .empty-log{color:var(--text-muted);font-size:13px;text-align:center;padding:18px 0;}

  .bottom-bar{
    position:fixed;bottom:16px;left:16px;right:16px;max-width:448px;margin:0 auto;
    display:flex;gap:10px;
  }
  .save-btn{
    flex:1;background:var(--accent);color:#1E2023;border:none;
    padding:16px;border-radius:12px;font-family:'JetBrains Mono',monospace;
    font-weight:700;font-size:13px;letter-spacing:0.12em;text-transform:uppercase;
    cursor:pointer;
  }
  .clear-btn{
    flex:0 0 auto;background:var(--surface);color:var(--text-muted);
    border:1px solid var(--border);padding:16px 14px;border-radius:12px;
    font-family:'JetBrains Mono',monospace;font-weight:700;font-size:11px;
    letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;
  }

  .modal-overlay{
    position:fixed;inset:0;background:rgba(0,0,0,0.6);display:none;
    align-items:center;justify-content:center;padding:20px;z-index:10;
  }
  .modal-overlay.active{display:flex;}
  .modal{
    background:var(--surface);border:1px solid var(--border);border-radius:12px;
    padding:20px;max-width:340px;width:100%;
  }
  .modal h3{margin:0 0 10px;font-size:16px;}
  .modal p{
    font-size:13px;color:var(--text-muted);line-height:1.6;
    font-family:'JetBrains Mono',monospace;white-space:pre-line;margin:0;
  }
  .modal-actions{display:flex;gap:10px;margin-top:18px;}
  .modal-actions button{
    flex:1;padding:12px;border-radius:8px;border:1px solid var(--border);
    font-weight:800;cursor:pointer;font-family:'Manrope',sans-serif;font-size:13px;
  }
  .btn-secondary{background:var(--surface-2);color:var(--text);}
  .btn-primary{background:var(--accent);color:#1E2023;border:none;}

  .toast{
    position:fixed;bottom:90px;left:50%;
    transform:translateX(-50%) translateY(20px);
    background:var(--surface-2);border:1px solid var(--border);color:var(--text);
    padding:10px 18px;border-radius:8px;font-size:13px;opacity:0;
    transition:opacity .25s, transform .25s;pointer-events:none;
    max-width:90%;text-align:center;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="app">

  <div class="eyebrow">Daily Tally</div>
  <h1>Today's food log</h1>

  <div class="profile-switcher" id="profileSwitcher">
    <button class="profile-btn active" data-profile="biswadip">Biswadip</button>
    <button class="profile-btn" data-profile="srirupa">Srirupa</button>
  </div>

  <div class="meta-row">
    <label>Date
      <input type="date" id="dateInput">
    </label>
    <label>Weight (kg)
      <input type="number" id="weightInput" step="0.1" inputmode="decimal" placeholder="71.0">
    </label>
  </div>

  <div class="gauge-section">
    <div class="gauge-wrap">
      <svg viewBox="0 0 200 200" width="180" height="180">
        <circle id="gaugeBg" cx="100" cy="100" r="80" fill="none" stroke-width="14"/>
        <circle id="gaugeProgress" cx="100" cy="100" r="80" fill="none" stroke-width="14"
                stroke-linecap="round" stroke-dasharray="502.65" stroke-dashoffset="502.65"/>
      </svg>
      <div class="gauge-center">
        <div class="gauge-total" id="gaugeTotal">0</div>
        <div class="gauge-target">/ <input type="number" id="targetInput" value="1750"> kcal</div>
      </div>
    </div>
    <div class="gauge-status" id="gaugeStatus">1750 kcal remaining</div>
  </div>

  <div id="itemsContainer"></div>

  <div class="section-label">Add other</div>
  <div class="others-row">
    <input type="text" id="otherName" placeholder="Item name">
    <input type="number" id="otherKcal" placeholder="kcal" inputmode="numeric">
    <button id="addOtherBtn">Add</button>
  </div>

  <div class="section-label">
    Today's log <span class="count" id="logCount">0 items</span>
  </div>
  <div class="log-list" id="logList"></div>
  <div class="empty-log" id="emptyLog">Nothing logged yet — tap an item above to add it.</div>
</div>

<div class="bottom-bar">
  <button class="save-btn" id="saveBtn">Save to doc &amp; start fresh</button>
  <button class="clear-btn" id="clearBtn">Clear</button>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 id="modalTitle">Save today's log?</h3>
    <p id="modalSummary"></p>
    <div class="modal-actions">
      <button class="btn-secondary" id="cancelBtn">Cancel</button>
      <button class="btn-primary" id="confirmBtn">Save &amp; clear</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ---- CONFIG ----
  // Paste your Google Apps Script Web App URL here (see setup instructions).
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyZ-rO-JDz1cAYjfHGoueiGJ9Tppu3deRplrZT43ZyM5Ri6uV1kOMYoZZFxlg-dOUX-/exec';

  // ---- DATA ----
  const CATEGORIES = [
    { title: 'Protein & dal', items: [
      { name: 'Fish / poultry (fist)', kcal: 250 },
      { name: 'Chicken curry (3 chunks)', kcal: 300 },
      { name: 'Red meat (fist)', kcal: 375 },
      { name: 'Dal (1 cup)', kcal: 200 },
      { name: 'Boiled egg', kcal: 70 },
      { name: 'Cooked egg', kcal: 100 },
      { name: 'Fried egg', kcal: 110 },
      { name: 'Chickpea & potato curry (1 cup)', kcal: 220 },
      { name: 'Veg & potato curry (1 cup)', kcal: 180 },
      { name: 'Paneer matar (5 pieces)', kcal: 280 },
    ]},
    { title: 'Grains & breads', items: [
      { name: 'Rice (1 cup)', kcal: 200 },
      { name: 'Noodles w/ veggies (1 cup)', kcal: 270 },
      { name: 'Chapati', kcal: 70 },
      { name: 'Chapati + ghee', kcal: 100 },
      { name: 'Simple paratha', kcal: 100 },
      { name: 'Aloo paratha', kcal: 150 },
      { name: 'Malabar paratha', kcal: 250 },
      { name: 'Poori', kcal: 125 },
      { name: 'Bread, 1 slice', kcal: 95 },
      { name: 'Bread slice with cheese', kcal: 190 },
      { name: 'Pizza, 1 slice', kcal: 280 },
      { name: 'Dosa (home)', kcal: 125 },
      { name: 'Dosa (restaurant)', kcal: 350 },
      { name: 'Idli', kcal: 50 },
    ]},
    { title: 'Vegetables', items: [
      { name: 'Veg, no oil (1 cup)', kcal: 50 },
      { name: 'Veg, with oil (1 cup)', kcal: 100 },
      { name: 'Starchy veg, no oil (1 cup)', kcal: 125 },
      { name: 'Starchy veg, with oil (1 cup)', kcal: 175 },
    ]},
    { title: 'Dairy, drinks & fruit', items: [
      { name: 'Tea with milk, no sugar', kcal: 65 },
      { name: 'Coffee with milk, no sugar', kcal: 65 },
      { name: 'Sugar, 1 tsp', kcal: 16 },
      { name: 'Fruit juice (1 cup)', kcal: 125 },
      { name: 'Banana', kcal: 100 },
      { name: 'Medium fruit', kcal: 100 },
    ]},
    { title: 'Fats', items: [
      { name: 'Oil/ghee, 1 tbsp', kcal: 130 },
      { name: 'Oil/ghee, 1 tsp', kcal: 45 },
    ]},
    { title: 'Snacks', items: [
      { name: 'Biscuit, 1 piece', kcal: 60 },
      { name: 'Bhujiya / namkeen (20g)', kcal: 112 },
      { name: 'Peanuts (9g)', kcal: 50 },
      { name: 'Cashew (9g)', kcal: 50 },
      { name: 'Potato chips (20g)', kcal: 110 },
    ]},
  ];

  // ---- PROFILES ----
  const PROFILES = [
    { id: 'biswadip', name: 'Biswadip', target: 1800 },
    { id: 'srirupa', name: 'Srirupa', target: 1400 }
  ];

  let activeProfile = 'biswadip';
  let profileData = {};
  PROFILES.forEach(p => {
    profileData[p.id] = { weight: '', target: p.target, entries: [], nextId: 1 };
  });

  // ---- STATE (working copy for the active profile) ----
  let entries = []; // {id, name, kcal}
  let nextId = 1;
  let pendingAction = 'save';
  const C = 2 * Math.PI * 80; // gauge circumference

  // ---- ELEMENTS ----
  const itemsContainer = document.getElementById('itemsContainer');
  const dateInput = document.getElementById('dateInput');
  const weightInput = document.getElementById('weightInput');
  const targetInput = document.getElementById('targetInput');
  const gaugeTotal = document.getElementById('gaugeTotal');
  const gaugeStatus = document.getElementById('gaugeStatus');
  const gaugeProgress = document.getElementById('gaugeProgress');
  const logList = document.getElementById('logList');
  const logCount = document.getElementById('logCount');
  const emptyLog = document.getElementById('emptyLog');
  const otherName = document.getElementById('otherName');
  const otherKcal = document.getElementById('otherKcal');
  const addOtherBtn = document.getElementById('addOtherBtn');
  const saveBtn = document.getElementById('saveBtn');
  const modalOverlay = document.getElementById('modalOverlay');
  const modalSummary = document.getElementById('modalSummary');
  const cancelBtn = document.getElementById('cancelBtn');
  const confirmBtn = document.getElementById('confirmBtn');
  const clearBtn = document.getElementById('clearBtn');
  const modalTitle = document.getElementById('modalTitle');
  const toast = document.getElementById('toast');

  // ---- INIT ----
  const TODAY = new Date().toISOString().slice(0, 10);
  dateInput.value = TODAY;
  gaugeProgress.setAttribute('stroke-dasharray', C.toFixed(2));

  CATEGORIES.forEach(cat => {
    const label = document.createElement('div');
    label.className = 'section-label';
    label.innerHTML = '<span>' + cat.title + '</span>';
    itemsContainer.appendChild(label);

    const grid = document.createElement('div');
    grid.className = 'item-grid';
    cat.items.forEach(item => {
      const tile = document.createElement('button');
      tile.className = 'item-tile';
      tile.innerHTML = '<div class="name">' + item.name + '</div><div class="kcal">' + item.kcal + ' kcal</div>';
      tile.addEventListener('click', () => {
        addEntry(item.name, item.kcal);
        tile.classList.add('tapped');
        setTimeout(() => tile.classList.remove('tapped'), 220);
      });
      grid.appendChild(tile);
    });
    itemsContainer.appendChild(grid);
  });

  // ---- CORE FUNCTIONS ----
  function addEntry(name, kcal) {
    entries.push({ id: nextId++, name, kcal });
    render();
  }

  function removeOne(name, kcal) {
    // remove the most recently added matching entry
    for (let i = entries.length - 1; i >= 0; i--) {
      if (entries[i].name === name && entries[i].kcal === kcal) {
        entries.splice(i, 1);
        break;
      }
    }
    render();
  }

  function groupEntries() {
    const map = new Map();
    entries.forEach(e => {
      const key = e.name + '|' + e.kcal;
      if (!map.has(key)) map.set(key, { name: e.name, kcal: e.kcal, count: 0 });
      map.get(key).count++;
    });
    return Array.from(map.values());
  }

  // ---- LOCAL PERSISTENCE ----
  const STORAGE_KEY = 'dailyTallyState_v1';

  function saveState() {
    try {
      profileData[activeProfile] = {
        weight: weightInput.value,
        target: targetInput.value,
        entries: entries,
        nextId: nextId
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        date: dateInput.value,
        activeProfile: activeProfile,
        profileData: profileData
      }));
    } catch (e) { /* storage unavailable */ }
  }

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      const state = JSON.parse(raw);

      if (state.date) dateInput.value = state.date;
      // Always override with today's date
      dateInput.value = TODAY;

      if (state.profileData) {
        profileData = state.profileData;
        PROFILES.forEach(p => {
          if (!profileData[p.id]) {
            profileData[p.id] = { weight: '', target: p.target, entries: [], nextId: 1 };
          }
        });
      } else if (Array.isArray(state.entries)) {
        // migrate from an earlier single-profile version
        profileData.biswadip = {
          weight: state.weight || '',
          target: state.target || profileData.biswadip.target,
          entries: state.entries,
          nextId: state.nextId || 1
        };
      }

      if (state.activeProfile && profileData[state.activeProfile]) {
        activeProfile = state.activeProfile;
      }

      const data = profileData[activeProfile];
      weightInput.value = data.weight || '';
      targetInput.value = data.target;
      entries = Array.isArray(data.entries) ? data.entries : [];
      nextId = typeof data.nextId === 'number' ? data.nextId : 1;

      document.querySelectorAll('.profile-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.profile === activeProfile);
      });
    } catch (e) { /* storage unavailable or corrupt */ }
  }

  function switchProfile(id) {
    if (id === activeProfile) return;
    profileData[activeProfile] = {
      weight: weightInput.value,
      target: targetInput.value,
      entries: entries,
      nextId: nextId
    };
    activeProfile = id;
    const data = profileData[id];
    weightInput.value = data.weight || '';
    targetInput.value = data.target;
    entries = data.entries;
    nextId = data.nextId;
    document.querySelectorAll('.profile-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.profile === id);
    });
    render();
  }

  function render() {
    const total = entries.reduce((s, e) => s + e.kcal, 0);
    const target = parseFloat(targetInput.value) || 1750;

    // gauge
    gaugeTotal.textContent = total;
    const ratio = total / target;
    let color;
    if (ratio <= 0.9) color = 'var(--good)';
    else if (ratio <= 1.05) color = 'var(--warn)';
    else color = 'var(--over)';
    gaugeProgress.style.stroke = color;
    gaugeTotal.style.color = color;
    gaugeStatus.style.color = color;

    const pct = Math.min(ratio, 1);
    gaugeProgress.style.strokeDashoffset = (C * (1 - pct)).toFixed(2);

    const diff = Math.round(target - total);
    gaugeStatus.textContent = diff >= 0
      ? diff + ' kcal remaining'
      : Math.abs(diff) + ' kcal over';

    // log list
    const groups = groupEntries();
    logCount.textContent = entries.length + ' item' + (entries.length === 1 ? '' : 's');

    if (groups.length === 0) {
      logList.innerHTML = '';
      emptyLog.style.display = 'block';
    } else {
      emptyLog.style.display = 'none';
      logList.innerHTML = '';
      groups.forEach(g => {
        const row = document.createElement('div');
        row.className = 'log-row';
        row.innerHTML =
          '<div class="name">' + g.name + '</div>' +
          '<div class="kcal">' + (g.kcal * g.count) + ' kcal</div>' +
          '<div class="controls">' +
            '<button class="minus">−</button>' +
            '<div class="x-count">×' + g.count + '</div>' +
            '<button class="plus">+</button>' +
          '</div>';
        row.querySelector('.minus').addEventListener('click', () => removeOne(g.name, g.kcal));
        row.querySelector('.plus').addEventListener('click', () => addEntry(g.name, g.kcal));
        logList.appendChild(row);
      });
    }

    saveState();
  }

  // ---- ADD OTHER ----
  addOtherBtn.addEventListener('click', () => {
    const name = otherName.value.trim();
    const kcal = parseInt(otherKcal.value, 10);
    if (!name || !kcal || kcal <= 0) {
      showToast('Enter a name and a kcal value');
      return;
    }
    addEntry(name, kcal);
    otherName.value = '';
    otherKcal.value = '';
  });

  // ---- TARGET CHANGE ----
  targetInput.addEventListener('input', render);

  // ---- PERSIST DATE/WEIGHT CHANGES ----
  dateInput.addEventListener('input', saveState);
  weightInput.addEventListener('input', saveState);

  // ---- SAVE / MODAL ----
  saveBtn.addEventListener('click', () => {
    pendingAction = 'save';
    const profileName = PROFILES.find(p => p.id === activeProfile).name;
    const total = entries.reduce((s, e) => s + e.kcal, 0);
    const groups = groupEntries();
    const lines = groups.map(g => '• ' + g.name + (g.count > 1 ? ' ×' + g.count : '') + ' — ' + (g.kcal * g.count) + ' kcal');
    const summary =
      'Profile: ' + profileName + '\n' +
      'Date: ' + (dateInput.value || '—') + '\n' +
      'Weight: ' + (weightInput.value || '—') + ' kg\n' +
      'Total: ' + total + ' / ' + (targetInput.value || 1750) + ' kcal\n\n' +
      (lines.length ? lines.join('\n') : '(no items logged)') +
      '\n\nThis will be added to your Google Doc and the list will be cleared.';
    modalTitle.textContent = "Save today's log?";
    confirmBtn.textContent = 'Save & clear';
    modalSummary.textContent = summary;
    modalOverlay.classList.add('active');
  });

  clearBtn.addEventListener('click', () => {
    pendingAction = 'clear';
    const profileName = PROFILES.find(p => p.id === activeProfile).name;
    const total = entries.reduce((s, e) => s + e.kcal, 0);
    const groups = groupEntries();
    const lines = groups.map(g => '• ' + g.name + (g.count > 1 ? ' ×' + g.count : '') + ' — ' + (g.kcal * g.count) + ' kcal');
    const summary =
      'Profile: ' + profileName + '\n' +
      'Date: ' + (dateInput.value || '—') + '\n' +
      'Total: ' + total + ' kcal\n\n' +
      (lines.length ? lines.join('\n') : '(no items logged)') +
      '\n\nThis clears the list without saving to your doc.';
    modalTitle.textContent = "Clear today's log?";
    confirmBtn.textContent = 'Clear log';
    modalSummary.textContent = summary;
    modalOverlay.classList.add('active');
  });

  cancelBtn.addEventListener('click', () => {
    modalOverlay.classList.remove('active');
  });

  confirmBtn.addEventListener('click', async () => {
    if (pendingAction === 'clear') {
      entries = [];
      render();
      modalOverlay.classList.remove('active');
      showToast('Log cleared');
      return;
    }

    const total = entries.reduce((s, e) => s + e.kcal, 0);
    const groups = groupEntries().map(g => ({ name: g.name, kcal: g.kcal, count: g.count, subtotal: g.kcal * g.count }));
    const payload = {
      date: dateInput.value,
      profile: PROFILES.find(p => p.id === activeProfile).name,
      weight: weightInput.value,
      target: targetInput.value,
      total: total,
      items: groups
    };

    if (!SCRIPT_URL || SCRIPT_URL.indexOf('PASTE_YOUR') === 0) {
      showToast('Set your Apps Script URL in the file first — see setup instructions');
      modalOverlay.classList.remove('active');
      return;
    }

    try {
      await fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload)
      });
      entries = [];
      render();
      modalOverlay.classList.remove('active');
      showToast('Saved to your doc — list cleared');
    } catch (err) {
      modalOverlay.classList.remove('active');
      showToast('Could not reach the doc — check your connection. List not cleared.');
    }
  });

  // ---- TOAST ----
  function showToast(msg, duration = 2800) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), duration);
  }

  document.querySelectorAll('.profile-btn').forEach(btn => {
    btn.addEventListener('click', () => switchProfile(btn.dataset.profile));
  });

  loadState();
  render();
</script>
</body>
</html>
